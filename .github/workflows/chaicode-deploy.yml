name: Deploy Nodejs application

on:
  push:
    branches:
      - master

jobs: 
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: 210.79.129.19
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd vps-testing/
            git pull
            npm install
            pm2 restart 0
