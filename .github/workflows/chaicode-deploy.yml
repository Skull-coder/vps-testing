name: Deploy Nodejs application

on:
  push:
    branches:
      - master

jobs: 
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      -  name: Login to Docker Hub
         uses: docker/login-action@v4
         with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      

      -  name: Set up QEMU
         uses: docker/setup-qemu-action@v4
      
      -  name: Set up Docker Buildx
         uses: docker/setup-buildx-action@v4
      
      - name: Docker build and push
        run: |
          docker build -t skullcoder/chaicode-node .
          docker push skullcoder/chaicode-node
      
      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: 210.79.129.19
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            sudo docker pull skullcoder/chaicode-node
            sudo docker stop $(docker ps -q --filter "ancestor=skullcoder/chaicode-node") || true
            sudo docker rm $(docker ps -a -q --filter "ancestor=skullcoder/chaicode-node") || true
            sudo docker run -d -p 8000:8000 skullcoder/chaicode-node
